<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>필터링 리뷰 — 검증 도구</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<div id="header"></div>
<div id="progress"></div>

<div class="note">
    <strong>📋 필터링 리뷰</strong><br>
    이 헤드라인이 분석 주제와 <b>관련 있는지</b>를 본인이 먼저 판단해 주세요.<br>
    평가 직후 메인 AI 와 Judge LLM 의 판단이 자동으로 표시되어 비교할 수 있습니다.<br>
    • <b>키보드</b> : <code>1</code> = 관련 / <code>2</code> = 무관 / <code>3</code> = 건너뜀
</div>

<div id="cards"></div>
<div id="empty" class="empty" style="display:none;">조건에 맞는 기사가 없습니다.</div>

<div class="action-bar">
    <div class="info"><b id="bar-info">로딩 중...</b></div>
    <div>
        <a href="index.html" class="btn">세트 선택으로</a>
        <a href="result.html" class="btn primary">결과 보기</a>
    </div>
</div>

<footer>차의과학대학교 AI헬스케어융합학과 · 박대근 교수</footer>

</div>

<script src="app.js"></script>
<script>
const sess = requireSession();
let SAMPLES = [];
let MY = {};
let META = null;

(async () => {
    try {
        const data = await apiGet('get_pack', {
            id: sess.pack.eval_set_id,
            pack: sess.pack.pack_no,
            type: 'filter',
        });
        SAMPLES = data.samples;
        META    = data.meta;

        // 내 응답 불러오기
        const allMine = await apiGet('get_user_progress', {user: sess.user.user_id});
        // 전체 응답 받아오기 (sample_id 단위)
        const myReviews = await fetch(`${API_BASE}?action=get_pack&id=${encodeURIComponent(sess.pack.eval_set_id)}&pack=${sess.pack.pack_no}&type=filter`);
        // 위는 샘플 fetch — 내 응답은 직접 sample_id 별로 가져와야 함
        // 더 간단: stats 시 review 까지 받아오기보다, 한 번에 query 한 후 로컬에 보관
        // 일단 응답이 있는지 빠르게 알아내려면 별도 endpoint 가 깔끔하지만
        // 우선 모든 응답을 한 사람 단위로 fetch (있는 endpoint 사용)
        const reviewsResp = await fetch(`${API_BASE}?action=all_reviews&id=${encodeURIComponent(sess.pack.eval_set_id)}`);
        const allReviews = await reviewsResp.json();
        allReviews.filter(r => r.user_id === sess.user.user_id).forEach(r => {
            MY[r.sample_id] = {human_label: r.human_label, note: r.note || ''};
        });

        document.getElementById('header').innerHTML = renderHeader(
            "📋 필터링 리뷰",
            `${META.topic_name} · 세트 ${META.pack_no} (${SAMPLES.length}개)`
        );

        render();
    } catch (e) {
        document.getElementById('cards').innerHTML =
            `<div class="empty" style="color:#dc2626;">로드 실패: ${esc(e.message)}</div>`;
    }
})();

function renderCard(s, idx) {
    const p = s.payload || {};
    const my = MY[s.sample_id] || {};
    const myLabel = my.human_label || '';

    const cardCls = s.ai_label === 'related' ? 'related' : 'unrelated';

    const aiReveal = myLabel && myLabel !== 'skip' && myLabel !== 'cleared'
        ? renderAiReveal('filter', s, myLabel)
        : '';

    return `
    <div class="card ${cardCls}" data-sample="${s.sample_id}">
        <div class="meta">
            <span style="color:#9ca3af;">#${idx + 1}</span>
            <span>📅 ${fmtDate(p.date)}</span>
            <span>📰 ${esc(p.press || '')}</span>
        </div>
        <h3><a href="${esc(s.url_a)}" target="_blank">${esc(p.title || '')}</a></h3>
        <div class="preview">${esc(p.preview || '')}</div>

        <div class="actions">
            <span class="label">내 평가:</span>
            <button class="btn related ${myLabel === 'related' ? 'active' : ''}"
                    onclick="setLabel(${s.sample_id}, 'related')">
                1. 관련 있음
            </button>
            <button class="btn unrelated ${myLabel === 'unrelated' ? 'active' : ''}"
                    onclick="setLabel(${s.sample_id}, 'unrelated')">
                2. 관련 없음
            </button>
            <button class="btn skip ${myLabel === 'skip' ? 'active' : ''}"
                    onclick="setLabel(${s.sample_id}, 'skip')">
                3. 건너뜀
            </button>
        </div>

        ${aiReveal}
    </div>`;
}

function render() {
    const c = document.getElementById('cards');
    const e = document.getElementById('empty');
    if (SAMPLES.length === 0) {
        c.innerHTML = ''; e.style.display = 'block';
    } else {
        e.style.display = 'none';
        c.innerHTML = SAMPLES.map((s, i) => renderCard(s, i)).join('');
    }
    const total = SAMPLES.length;
    const done  = SAMPLES.filter(s => MY[s.sample_id] && MY[s.sample_id].human_label).length;
    document.getElementById('progress').innerHTML =
        renderProgress(done, total, "필터링 검증 진행");
    document.getElementById('bar-info').textContent =
        `필터링: ${done} / ${total} 완료`;
}

async function setLabel(sampleId, label) {
    MY[sampleId] = {human_label: label, note: MY[sampleId]?.note || ''};
    try {
        await apiPost('save_review', {
            eval_set_id: sess.pack.eval_set_id,
            pack_no:     sess.pack.pack_no,
            review_type: 'filter',
            user_id:     sess.user.user_id,
            display_name: sess.user.display_name,
            sample_id:   sampleId,
            human_label: label,
            note:        MY[sampleId].note,
        });
        toast("저장됨");
    } catch (e) {
        toast("저장 실패: " + e.message, "error");
    }
    render();
}

// 키보드: 화면 중앙 카드에 적용
document.addEventListener('keydown', (e) => {
    if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    const cards = document.querySelectorAll('#cards .card');
    if (cards.length === 0) return;
    const midY = window.scrollY + window.innerHeight / 2;
    let target = cards[0], minDist = Infinity;
    cards.forEach(c => {
        const r = c.getBoundingClientRect();
        const cy = window.scrollY + r.top + r.height / 2;
        const d = Math.abs(cy - midY);
        if (d < minDist) { minDist = d; target = c; }
    });
    const sid = parseInt(target.dataset.sample);
    if (e.key === '1') setLabel(sid, 'related');
    else if (e.key === '2') setLabel(sid, 'unrelated');
    else if (e.key === '3') setLabel(sid, 'skip');
});
</script>
</body>
</html>
