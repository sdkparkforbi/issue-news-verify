<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>키워드 리뷰 — 검증 도구</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<div id="header"></div>
<div id="progress"></div>

<div class="note">
    <strong>📝 키워드 리뷰 사용법</strong><br>
    각 기사의 추출된 키워드 위를 <b>클릭</b> 해서 적절성을 표시해 주세요.
    한 번 클릭하면 <b style="color:#065f46">✓ 적절</b>, 두 번 클릭하면 <b style="color:#991b1b">✗ 부적절</b>, 다시 누르면 중립으로 돌아갑니다.<br>
    누락된 키워드가 있으면 아래 입력란에 추가하실 수 있습니다.<br>
    • 평가하면 자동으로 DB 에 저장됩니다.
</div>

<div id="cards"></div>
<div id="empty" class="empty" style="display:none;">키워드 평가 대상 기사가 없습니다.</div>

<div class="action-bar">
    <div class="info"><b id="bar-info">로딩 중...</b></div>
    <div>
        <a href="index.html" class="btn">세트 선택으로</a>
        <a href="result.html" class="btn primary">결과 보기</a>
    </div>
</div>

<footer>
    차의과학대학교 AI헬스케어융합학과 · 박대근 교수
</footer>

</div>

<script src="app.js"></script>
<script>
const sess = requireSession();
let SAMPLES = [];
let MY      = {};
let META    = null;

(async () => {
    try {
        const data = await apiGet('get_pack', {
            id:   sess.pack.eval_set_id,
            pack: sess.pack.pack_no,
            type: 'keyword',
        });
        SAMPLES = data.samples;
        META    = data.meta;

        // 내 응답
        const reviewsResp = await fetch(`${API_BASE}?action=all_reviews&id=${encodeURIComponent(sess.pack.eval_set_id)}`);
        const allReviews = await reviewsResp.json();
        allReviews.filter(r => r.user_id === sess.user.user_id).forEach(r => {
            try {
                MY[r.sample_id] = r.human_label ? JSON.parse(r.human_label) : {marks:{}, added:[]};
            } catch (e) {
                MY[r.sample_id] = {marks:{}, added:[]};
            }
        });

        document.getElementById('header').innerHTML = renderHeader(
            "📝 키워드 리뷰",
            `${META.topic_name} · 세트 ${META.pack_no} (${SAMPLES.length}개)`
        );

        render();
    } catch (e) {
        document.getElementById('cards').innerHTML =
            `<div class="empty" style="color:#dc2626;">로드 실패: ${esc(e.message)}</div>`;
    }
})();

function renderCard(s) {
    const p = s.payload || {};
    const my = MY[s.sample_id] || {marks: {}, added: []};
    const keywords = p.keywords || {};

    // 키워드 칩 (클릭 가능)
    const chips = Object.entries(keywords)
        .sort((a,b) => b[1] - a[1])
        .map(([w, f]) => {
            const mark = my.marks[w];   // 'ok' | 'ng' | undefined
            const cls = mark === 'ok' ? 'ok' : mark === 'ng' ? 'ng' : '';
            return `<span class="kw ${cls}" onclick="toggleMark(${s.sample_id}, '${esc(w)}')">${esc(w)} <small>${f}</small></span>`;
        }).join('');

    // 누락 키워드 추가 칩들
    const addedChips = (my.added || []).map((w, i) =>
        `<span class="kw ok">+ ${esc(w)} <small onclick="removeAdded(${s.sample_id}, ${i})" style="cursor:pointer;color:#dc2626;font-weight:700;margin-left:4px;">×</small></span>`
    ).join('');

    return `
    <div class="card related" data-sample="${s.sample_id}">
        <div class="meta">
            <span>📅 ${fmtDate(p.date)}</span>
            <span>📰 ${esc(p.press || '')}</span>
            <span style="color:#9ca3af;">키워드 ${Object.keys(keywords).length}개</span>
        </div>
        <h3><a href="${esc(s.url_a)}" target="_blank">${esc(p.title || '')}</a></h3>
        <div class="preview">${esc(p.preview || '')}</div>

        ${p.body_excerpt ? `
        <details style="margin-bottom:10px;">
            <summary style="cursor:pointer; color:#2563eb; font-size:13px;">본문 일부 보기 (▼)</summary>
            <div style="background:#f9fafb; padding:12px; border-radius:6px; margin-top:6px; font-size:13px; max-height:200px; overflow:auto;">
                ${esc(p.body_excerpt)}
            </div>
        </details>` : ''}

        <div style="font-size:12px; color:#6b7280; margin-bottom:6px;">
            <b>AI 추출 키워드</b> (클릭으로 적절/부적절 토글):
        </div>
        <div class="kws">${chips}</div>

        ${addedChips ? `
            <div style="font-size:12px; color:#6b7280; margin: 12px 0 6px 0;">
                <b>내가 추가한 키워드:</b>
            </div>
            <div class="kws">${addedChips}</div>
        ` : ''}

        <div style="display:flex; gap:6px; margin-top:12px;">
            <input type="text" placeholder="누락된 키워드 추가 (Enter)"
                   style="flex:1; padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:13px;"
                   onkeydown="if(event.key==='Enter') addKeyword(${s.sample_id}, this.value, this)">
            <span class="label" style="font-size:11px; color:#9ca3af; align-self:center;">
                ${countDone(my)}개 평가됨
            </span>
        </div>
    </div>`;
}

function countDone(my) {
    return Object.keys(my.marks || {}).length + (my.added?.length || 0);
}

function render() {
    const c = document.getElementById('cards');
    const e = document.getElementById('empty');
    if (SAMPLES.length === 0) {
        c.innerHTML = ''; e.style.display = 'block';
    } else {
        e.style.display = 'none';
        c.innerHTML = SAMPLES.map(renderCard).join('');
    }

    // 진행률 — 한 카드라도 평가가 되어 있으면 그 카드는 done
    const done = SAMPLES.filter(s => {
        const m = MY[s.sample_id];
        return m && (Object.keys(m.marks || {}).length > 0 || (m.added?.length || 0) > 0);
    }).length;
    document.getElementById('progress').innerHTML =
        renderProgress(done, SAMPLES.length, "키워드 검증 진행");
    document.getElementById('bar-info').textContent =
        `키워드: ${done} / ${SAMPLES.length} 완료`;
}

async function toggleMark(sampleId, word) {
    if (!MY[sampleId]) MY[sampleId] = {marks: {}, added: []};
    const cur = MY[sampleId].marks[word];
    if (!cur) MY[sampleId].marks[word] = 'ok';
    else if (cur === 'ok') MY[sampleId].marks[word] = 'ng';
    else delete MY[sampleId].marks[word];

    await save(sampleId);
    render();
}

async function addKeyword(sampleId, word, inputEl) {
    word = (word || '').trim();
    if (!word) return;
    if (!MY[sampleId]) MY[sampleId] = {marks: {}, added: []};
    if (!MY[sampleId].added.includes(word)) {
        MY[sampleId].added.push(word);
        await save(sampleId);
        render();
    }
    inputEl.value = '';
}

async function removeAdded(sampleId, i) {
    if (!MY[sampleId]) return;
    MY[sampleId].added.splice(i, 1);
    await save(sampleId);
    render();
}

async function save(sampleId) {
    try {
        await apiPost('save_review', {
            eval_set_id: sess.pack.eval_set_id,
            pack_no:     sess.pack.pack_no,
            review_type: 'keyword',
            user_id:     sess.user.user_id,
            display_name: sess.user.display_name,
            sample_id:   sampleId,
            human_label: JSON.stringify(MY[sampleId]),
            note:        '',
        });
    } catch (e) {
        toast("저장 실패: " + e.message, "error");
    }
}
</script>
</body>
</html>
